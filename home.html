          const response = await fetch(file);
          if (response.ok) {
            const htmlContent = await response.text();
            preloadedFiles.set(file, htmlContent);
            await preloadResourcesFromHTML(htmlContent, file);
          }
        } catch (error) {
          console.warn(`Failed to preload ${file}:`, error);
        }
        
        loadedCount++;
        const progress = Math.round((loadedCount / totalFiles) * 100);
        progressBar.style.width = `${progress}%`;
        preloaderText.textContent = `Preloading files... ${loadedCount}/${totalFiles}`;
        await new Promise(resolve => setTimeout(resolve, 30));
      }
      
      preloadComplete = true;
      currentlyPreloading = false;
      preloaderText.textContent = `Preloading complete! ${totalFiles} files loaded`;
      progressBar.style.width = '100%';
      
      setTimeout(() => {
        preloader.classList.remove('show');
        setTimeout(() => {
          preloader.style.display = 'none';
        }, 300);
      }, 1000);
    }

    async function preloadResourcesFromHTML(htmlContent, baseFile) {
      const cssLinks = extractCSSLinks(htmlContent);
      const imgsources = extractimgsources(htmlContent);
      const scriptSources = extractScriptSources(htmlContent);
      const allResources = [...cssLinks, ...imgsources, ...scriptSources];
      
      for (const resource of allResources) {
        if (!preloadedResources.has(resource)) {
          preloadedResources.add(resource);
          await preloadSingleResource(resource);
        }
      }
    }

    function extractCSSLinks(html) {
      const cssRegex = /<link[^>]*href="([^"]+\.css[^"]*)"[^>]*>/gi;
      const matches = [];
      let match;
      while ((match = cssRegex.exec(html)) !== null) {
        matches.push(match[1]);
      }
      return matches;
    }

    function extractimgsources(html) {
      const imgRegex = /<img[^>]*src="([^"]+)"[^>]*>/gi;
      const matches = [];
      let match;
      while ((match = imgRegex.exec(html)) !== null) {
        matches.push(match[1]);
      }
      return matches;
    }

    function extractScriptSources(html) {
      const scriptRegex = /<script[^>]*src="([^"]+)"[^>]*>/gi;
      const matches = [];
      let match;
      while ((match = scriptRegex.exec(html)) !== null) {
        matches.push(match[1]);
      }
      return matches;
    }

    async function preloadSingleResource(url) {
      try {
        const fullUrl = url.startsWith('http') ? url : new URL(url, window.location.href).href;
        if (url.endsWith('.css')) {
          const link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'style';
          link.href = fullUrl;
          link.onload = () => {
            const styleLink = document.createElement('link');
            styleLink.rel = 'stylesheet';
            styleLink.href = fullUrl;
            document.head.appendChild(styleLink);
          };
          document.head.appendChild(link);
        } else if (/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(url)) {
          await new Promise((resolve) => {
            const img = new Image();
            img.src = fullUrl;
            img.onload = resolve;
            img.onerror = resolve;
            setTimeout(resolve, 1000);
          });
        }
      } catch (error) {
        console.debug('Failed to preload resource:', url, error);
      }
    }

    async function loadPageFromFile(title, fileName) {
      const pageFrame = document.getElementById('pageFrame');

      const pageContent = document.getElementById('pageContent');
      
      if (preloadedFiles.has(fileName)) {
        const htmlContent = preloadedFiles.get(fileName);
        openPageWithContent(title, htmlContent);
      } else {
        try {
          const response = await fetch(fileName);
          if(!response.ok) throw new Error('File not found');
          const htmlContent = await response.text();
          openPageWithContent(title, htmlContent);
        } catch(error) {
          console.error('Error loading file:', error);
          openPageWithContent("Error");
        }
      }
    }

    function openPageWithContent(title, content) {
      const pageFrame = document.getElementById('pageFrame');
      const mainFrame = document.getElementById('mainFrame');
      const pageTitle = document.getElementById('pageTitle');
      const pageContent = document.getElementById('pageContent');
      const backBtn = document.getElementById('backBtn');
      const toolbarLeft = document.querySelector('.toolbar-left');
      const pageToolbar = document.querySelector('.page-toolbar');
      
      backBtn.classList.remove('slide-out');
      pageTitle.classList.remove('slide-out');
      toolbarLeft.classList.remove('slide-out');
      pageToolbar.classList.remove('slide-up');
      pageContent.classList.remove('fade-out');
      
      pageFrame.classList.remove('hide');
      pageFrame.classList.remove('critical-hidden');
      
      if (typeof content === 'string' && content.trim().startsWith('<!')) {
        const base = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const contentWithBase = content.replace('<head>', '<head><base href="' + base + '">');
        const blob = new Blob([contentWithBase], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);
        
        pageContent.innerHTML = `<iframe src="${blobUrl}" style="width:100%;height:100%;border:0;"></iframe>`;
        setTimeout(() => {
          const iframe = pageContent.querySelector('iframe');
          if (iframe) {
            iframe.onload = () => {
              setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
            };
          }
        }, 100);
      } else {
        pageContent.innerHTML = `<div class="html-content-wrapper">${content}</div>`;
      }
      
      void pageFrame.offsetWidth;
      mainFrame.style.opacity = '0';
      mainFrame.style.pointerEvents = 'none';
      
      setTimeout(() => {
        pageFrame.classList.add('show');
      }, 50);
    }
